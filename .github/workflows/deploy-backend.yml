name: Backend CI/CD

on:
  push:
    branches: [ master ]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      - name: Build with Maven
        working-directory: backend
        run: mvn clean package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: kiwi-dream-backend-jar
          path: backend/target/*.jar
          retention-days: 3

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: kiwi-dream-backend-jar
          path: ./artifact

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./artifact/*.jar"
          target: "/opt/kiwi-dream/"
          strip_components: 1

      - name: Restart service on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/kiwi-dream
            ls *.jar | grep -v kiwi-dream-backend.jar | xargs -I{} mv {} kiwi-dream-backend.jar 2>/dev/null || true
            sudo systemctl restart kiwi-dream-backend
            sleep 6
            sudo systemctl status kiwi-dream-backend --no-pager
