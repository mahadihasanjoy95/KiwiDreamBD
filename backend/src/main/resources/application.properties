spring.application.name=kiwi-dream-backend

server.port=8081
server.forward-headers-strategy=framework

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/kiwi_dream_bd?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Logging
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN

# JWT Configuration
jwt.secret=${JWT_SECRET:KiwiDreamLocalJwtSecretKeyForDev1234567890}
jwt.access-token-expiry-seconds=${JWT_ACCESS_EXPIRY:3600}
jwt.refresh-token-expiry-seconds=${JWT_REFRESH_EXPIRY:2592000}

# Super Admin Seed Configuration
app.seed.superadmin.email=${SUPERADMIN_EMAIL:superadmin@kiwidreambd.com}
app.seed.superadmin.password=${SUPERADMIN_PASSWORD:ChangeMe123!}
app.seed.superadmin.name=${SUPERADMIN_NAME:KiwiDream Super Admin}

# Email (SMTP / SES)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=${MAIL_FROM:KiwiDream BD <no-reply@kiwidreambd.local>}
app.contact.recipient-email=${CONTACT_RECIPIENT_EMAIL:mahadihasanjoy95@gmail.com}

# Frontend URLs
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.admin.url=${ADMIN_URL:http://localhost:5174}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:local-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:local-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}

# Exchange Rate Auto-Sync
# Free API — no key required. Provides USD-base rates for all major currencies including BDT.
# Rates are fetched on app startup and nightly at midnight via cron.
app.exchange-rate.api.url=${EXCHANGE_RATE_API_URL:https://api.exchangerate-api.com/v4/latest/USD}

# AWS S3 — icon file uploads (credentials via env: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY)
aws.region=${AWS_REGION:ap-southeast-2}
aws.s3.bucket=${AWS_S3_BUCKET:kiwidream-bd}

# Multipart upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
