  <linearGradient id="ak-water" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#00D4BA"></stop>
    <stop offset="100%" stop-color="#047857"></stop>
  </linearGradient>
  <filter id="ak-shadow">
    <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#10233A" flood-opacity="0.3"></feDropShadow>
  </filter>
  <filter id="ak-glow">
    <feGaussianBlur stdDeviation="5" result="b"></feGaussianBlur>
    <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
  </filter>
</defs>

