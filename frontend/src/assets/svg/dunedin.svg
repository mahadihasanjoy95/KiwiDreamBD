<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
<defs>
  <linearGradient id="dn-sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#10233A"></stop>
    <stop offset="60%" stop-color="#7C3AED"></stop>
    <stop offset="100%" stop-color="#0095A1"></stop>
  </linearGradient>
  <linearGradient id="dn-mtn1" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#EDE9FE"></stop>
    <stop offset="100%" stop-color="#7C3AED"></stop>
  </linearGradient>
  <linearGradient id="dn-mtn2" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#C4B5FD"></stop>
    <stop offset="100%" stop-color="#4C1D95"></stop>
  </linearGradient>
  <linearGradient id="dn-mtn3" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#A78BFA"></stop>
    <stop offset="100%" stop-color="#3730A3"></stop>
  </linearGradient>
  <linearGradient id="dn-snow" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#FFFFFF"></stop>
    <stop offset="100%" stop-color="#EDE9FE"></stop>
  </linearGradient>
  <linearGradient id="dn-sea" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0095A1"></stop>
    <stop offset="100%" stop-color="#10233A"></stop>
  </linearGradient>
  <linearGradient id="dn-aurora" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#7C3AED" stop-opacity="0"></stop>
    <stop offset="40%" stop-color="#00D4BA" stop-opacity="0.3"></stop>
    <stop offset="70%" stop-color="#7C3AED" stop-opacity="0.2"></stop>
    <stop offset="100%" stop-color="#10233A" stop-opacity="0"></stop>
  </linearGradient>
  <filter id="dn-shadow">
    <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#10233A" flood-opacity="0.3"></feDropShadow>
  </filter>
  <filter id="dn-glow">
    <feGaussianBlur stdDeviation="8" result="b"></feGaussianBlur>
    <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
  </filter>
</defs>

