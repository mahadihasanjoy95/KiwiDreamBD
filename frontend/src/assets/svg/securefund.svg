    <rect x="28" y="38" width="8" height="6" rx="2" fill="#F472B6" />
    <path d="M29.5 38V36.5C29.5 34.8 30.6 33.5 32 33.5C33.4 33.5 34.5 34.8 34.5 36.5V38" />
